version: "3.9"

services:
  # --------------------------------------------------------
  # Go Application Service
  # --------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: glk-app
    restart: unless-stopped
    ports:
      - "8081:8081" # Web Pelamar
      - "8082:8082" # Web Admin
    environment:
      - APP_ENV=production
      - PELAMAR_PORT=8081
      - ADMIN_PORT=8082
      - APP_URL=${APP_URL:-http://localhost:8081}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-glk_user}
      - DB_PASSWORD=${DB_PASSWORD:-glk_secret}
      - DB_NAME=${DB_NAME:-glk_db}
      - DB_SSLMODE=disable
      - JWT_SECRET=${JWT_SECRET:-changeme_in_production}
      - REDIS_HOST=redis:6379
      - REDIS_PASSWORD=
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - glk_network

  # --------------------------------------------------------
  # PostgreSQL 16 (Alpine - minimal disk footprint)
  # --------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: glk-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-glk_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-glk_secret}
      POSTGRES_DB: ${DB_NAME:-glk_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-glk_user} -d ${DB_NAME:-glk_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - glk_network

  # --------------------------------------------------------
  # Redis Service
  # --------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: glk-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - glk_network

# --------------------------------------------------------
# Volumes
# --------------------------------------------------------
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

# --------------------------------------------------------
# Networks
# --------------------------------------------------------
networks:
  glk_network:
    driver: bridge
