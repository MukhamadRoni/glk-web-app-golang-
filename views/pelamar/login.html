
<div class="text-center mt-2">
    <h5>Portal Pelamar</h5>
    <p class="text-muted">Masuk untuk melanjutkan lamaran Anda.</p>
</div>
<div class="p-2 mt-4">
    {{ if .Error }}
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            Swal.fire({
                title: "Gagal",
                text: "{{ .Error }}",
                icon: "error",
                confirmButtonColor: "#1f58c7",
                confirmButtonText: "Ok"
            });
        });
    </script>
    {{ end }}

    <form action="/login" method="POST">

        <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <div class="position-relative input-custom-icon">
                <input type="email" class="form-control" id="email" name="email"
                    placeholder="Masukkan email" required autofocus>
                <span class="bx bx-envelope"></span>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label" for="password-input">Password</label>
            <div class="position-relative auth-pass-inputgroup input-custom-icon">
                <span class="bx bx-lock-alt"></span>
                <input type="password" class="form-control" id="password-input" name="password"
                    placeholder="Masukkan password" required>
                <button type="button" class="btn btn-link position-absolute h-100 end-0 top-0" id="password-addon">
                    <i class="mdi mdi-eye-outline font-size-18 text-muted"></i>
                </button>
            </div>
        </div>

        <div class="mt-3">
            <button class="btn btn-primary w-100 waves-effect waves-light" type="submit" id="btn-pelamar-login">
                Masuk
            </button>
        </div>

        <div class="mt-4 text-center">
            <p class="mb-0">Belum punya akun?
                <a href="/register" class="fw-medium text-primary">Daftar sekarang</a>
            </p>
        </div>

    </form>
</div>
