{{ define "content" }}
<div class="text-center mt-2">
    <h5>Daftar Akun Pelamar</h5>
    <p class="text-muted">Buat akun untuk mulai melamar pekerjaan.</p>
</div>
<div class="p-2 mt-4">
    {{ if .Error }}
    <div class="alert alert-danger" role="alert">{{ .Error }}</div>
    {{ end }}

    <form action="/register" method="POST">

        <div class="mb-3">
            <label class="form-label" for="name">Nama Lengkap</label>
            <div class="position-relative input-custom-icon">
                <input type="text" class="form-control" id="name" name="name"
                    placeholder="Masukkan nama lengkap" required>
                <span class="bx bx-user"></span>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <div class="position-relative input-custom-icon">
                <input type="email" class="form-control" id="email" name="email"
                    placeholder="Masukkan email" required>
                <span class="bx bx-envelope"></span>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label" for="password-input">Password</label>
            <div class="position-relative auth-pass-inputgroup input-custom-icon">
                <span class="bx bx-lock-alt"></span>
                <input type="password" class="form-control" id="password-input" name="password"
                    placeholder="Minimal 8 karakter" required minlength="8">
                <button type="button" class="btn btn-link position-absolute h-100 end-0 top-0" id="password-addon">
                    <i class="mdi mdi-eye-outline font-size-18 text-muted"></i>
                </button>
            </div>
        </div>

        <div class="mt-3">
            <button class="btn btn-success w-100 waves-effect waves-light" type="submit" id="btn-register">
                Daftar
            </button>
        </div>

        <div class="mt-4 text-center">
            <p class="mb-0">Sudah punya akun?
                <a href="/login" class="fw-medium text-primary">Masuk di sini</a>
            </p>
        </div>

    </form>
</div>
{{ end }}
