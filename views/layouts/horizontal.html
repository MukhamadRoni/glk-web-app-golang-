<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>{{.Title}} | Portal Pelamar GLK</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portal Pelamar GLK Web App">
    <link rel="shortcut icon" href="/static/images/favicon.ico">

    <!-- CSS -->
    <link href="/static/css/bootstrap.min.css" id="bootstrap-style" rel="stylesheet" type="text/css" />
    <link href="/static/css/icons.min.css" rel="stylesheet" type="text/css" />
    <link href="/static/libs/sweetalert2/sweetalert2.min.css" rel="stylesheet" type="text/css" />
    <link href="/static/libs/choices.js/public/assets/styles/choices.min.css" rel="stylesheet" type="text/css" />
    <link href="/static/css/app.min.css" id="app-style" rel="stylesheet" type="text/css" />
    
    <style>
        :root, [data-bs-theme="light"] {
            --bs-primary: #F87242 !important;
            --bs-primary-rgb: 248, 114, 66 !important;
            --vz-primary: #F87242 !important;
            --vz-primary-rgb: 248, 114, 66 !important;
        }
        .btn-primary { background-color: #F87242 !important; border-color: #F87242 !important; }
        .btn-primary:hover, .btn-primary:focus, .btn-primary:active { background-color: #e56538 !important; border-color: #e56538 !important; }
        .bg-primary { background-color: #F87242 !important; }
        .text-primary { color: #F87242 !important; }

        /* Fix gap issue for horizontal layout */
        body[data-layout="horizontal"] .page-content {
            padding-top: 20px !important;
            margin-top: 0 !important;
        }
    </style>

    {{block "styles" .}}{{end}}
</head>

<body data-layout="horizontal">
    <div id="layout-wrapper">
        <header id="page-topbar">
            <div class="navbar-header">
                <div class="d-flex">
                    <!-- LOGO -->
                    <div class="navbar-brand-box">
                        <a href="/" class="logo logo-dark">
                            <span class="logo-sm">
                                <img src="/static/images/glk-assets/gurulesku-icon.png" alt="" height="30">
                            </span>
                            <span class="logo-lg">
                                <img src="/static/images/glk-assets/Logo-Guru-Lesku-ID.png" alt="" height="50">
                            </span>
                        </a>
                        <a href="/" class="logo logo-light">
                            <span class="logo-sm">
                                <img src="/static/images/glk-assets/gurulesku-icon.png" alt="" height="30">
                            </span>
                            <span class="logo-lg">
                                <img src="/static/images/glk-assets/Logo-Guru-Lesku-ID.png" alt="" height="50">
                            </span>
                        </a>
                    </div>
                    
                    <button type="button" class="btn btn-sm px-3 font-size-16 d-lg-none header-item waves-effect waves-light" data-bs-toggle="collapse" data-bs-target="#topnav-menu-content">
                        <i class="fa fa-fw fa-bars"></i>
                    </button>
                </div>

                <div class="d-flex">
                    <div class="dropdown d-inline-block">
                        <button type="button" class="btn header-item waves-effect" id="page-header-user-dropdown" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                            <img class="rounded-circle header-profile-user" src="/static/images/users/avatar-3.jpg" alt="Header Avatar">
                            <span class="d-none d-xl-inline-block ms-1" key="t-henry">{{.Username}}</span>
                            <i class="mdi mdi-chevron-down d-none d-xl-inline-block"></i>
                        </button>
                        <div class="dropdown-menu dropdown-menu-end">
                            <a class="dropdown-item" href="#"><i class="bx bx-user font-size-16 align-middle me-1"></i> <span key="t-profile">Profile</span></a>
                            <div class="dropdown-divider"></div>
                            <a class="dropdown-item text-danger" href="/logout"><i class="bx bx-power-off font-size-16 align-middle me-1 text-danger"></i> <span key="t-logout">Logout</span></a>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="topnav">
            <div class="container-fluid">
                <nav class="navbar navbar-light navbar-expand-lg topnav-menu">
                    <div class="collapse navbar-collapse" id="topnav-menu-content">
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a class="nav-link" href="/dashboard" id="topnav-dashboard">
                                    <i class="bx bx-home-circle me-2"></i><span key="t-dashboard">Status Lamaran</span>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="/apply" id="topnav-apply">
                                    <i class="bx bx-file me-2"></i><span key="t-apply">Lamaran</span>
                                </a>
                            </li>
                        </ul>
                    </div>
                </nav>
            </div>
        </div>

        <div class="main-content">
            <div class="page-content">
                <div class="container-fluid">
                    <div class="row">
                        <div class="col-12">
                            <div class="page-title-box d-sm-flex align-items-center justify-content-between">
                                <h4 class="mb-sm-0 font-size-18">{{.Title}}</h4>
                            </div>
                        </div>
                    </div>

                    {{embed}}
                </div>
            </div>

            <footer class="footer">
                <div class="container-fluid">
                    <div class="row">
                        <div class="col-sm-6">
                            <script>document.write(new Date().getFullYear())</script> © GLK Web App.
                        </div>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <!-- Right Sidebar for settings (optional, omitted) -->
    <div class="rightbar-overlay"></div>

    <!-- JAVASCRIPT -->
    <script src="/static/libs/jquery/jquery.min.js"></script>
    <script src="/static/libs/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/static/libs/metismenujs/metismenujs.min.js"></script>
    <script src="/static/libs/simplebar/simplebar.min.js"></script>
    <script src="/static/libs/eva-icons/eva.min.js"></script>
    <script src="/static/libs/sweetalert2/sweetalert2.min.js"></script>
    <script src="/static/libs/choices.js/public/assets/scripts/choices.min.js"></script>
    <script src="/static/js/app.js"></script>

    {{block "scripts" .}}{{end}}
</body>
</html>
