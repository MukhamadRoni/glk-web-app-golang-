
<div class="text-center mt-2">
    <h5>Welcome Back !</h5>
    <p class="text-muted">Sign in to continue to webadmin.</p>
</div>
<div class="p-2 mt-4">
    {{ if .Error }}
    <div class="alert alert-danger" role="alert">{{ .Error }}</div>
    {{ end }}

    <form action="/admin/login" method="POST">

        <div class="mb-3">
            <label class="form-label" for="username">Username</label>
            <div class="position-relative input-custom-icon">
                <input type="text" class="form-control" id="username" name="username"
                    placeholder="Enter username" required autofocus>
                <span class="bx bx-user"></span>
            </div>
        </div>

        <div class="mb-3">
            <div class="float-end">
                <a href="#" class="text-muted text-decoration-underline">Forgot password?</a>
            </div>
            <label class="form-label" for="password-input">Password</label>
            <div class="position-relative auth-pass-inputgroup input-custom-icon">
                <span class="bx bx-lock-alt"></span>
                <input type="password" class="form-control" id="password-input" name="password"
                    placeholder="Enter password" required>
                <button type="button" class="btn btn-link position-absolute h-100 end-0 top-0" id="password-addon">
                    <i class="mdi mdi-eye-outline font-size-18 text-muted"></i>
                </button>
            </div>
        </div>

        <div class="form-check py-1">
            <input type="checkbox" class="form-check-input" id="auth-remember-check" name="remember">
            <label class="form-check-label" for="auth-remember-check">Remember me</label>
        </div>

        <div class="mt-3">
            <button class="btn btn-primary w-100 waves-effect waves-light" type="submit" id="btn-login">
                Log In
            </button>
        </div>

        <div class="mt-4 text-center">
            <div class="signin-other-title">
                <h5 class="font-size-14 mb-3 mt-2 title"> Sign in with </h5>
            </div>

            <ul class="list-inline mt-2">
                <li class="list-inline-item">
                    <a href="javascript:void()" class="social-list-item bg-primary text-white border-primary">
                        <i class="bx bxl-facebook"></i>
                    </a>
                </li>
                <li class="list-inline-item">
                    <a href="javascript:void()" class="social-list-item bg-info text-white border-info">
                        <i class="bx bxl-linkedin"></i>
                    </a>
                </li>
                <li class="list-inline-item">
                    <a href="javascript:void()" class="social-list-item bg-danger text-white border-danger">
                        <i class="bx bxl-google"></i>
                    </a>
                </li>
            </ul>
        </div>

        <div class="mt-4 text-center">
            <p class="mb-0">Don't have an account ? <a href="#" class="fw-medium text-primary"> Signup now </a> </p>
        </div>
    </form>
</div>
