
<div class="text-center mt-2">
    <h5>Welcome Back !</h5>
    <p class="text-muted">Sign in to continue to webadmin.</p>
</div>
<div class="p-2 mt-4">
    {{ if .Error }}
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            Swal.fire({
                title: "Login Gagal",
                text: "{{ .Error }}",
                icon: "error",
                confirmButtonColor: "#1f58c7",
                confirmButtonText: "Ok"
            });
        });
    </script>
    {{ end }}

    <form action="/admin/login" method="POST">

        <div class="mb-3">
            <label class="form-label" for="username">Username</label>
            <div class="position-relative input-custom-icon">
                <input type="text" class="form-control" id="username" name="username"
                    placeholder="Enter username" required autofocus>
                <span class="bx bx-user"></span>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label" for="password-input">Password</label>
            <div class="position-relative auth-pass-inputgroup input-custom-icon">
                <span class="bx bx-lock-alt"></span>
                <input type="password" class="form-control" id="password-input" name="password"
                    placeholder="Enter password" required>
                <button type="button" class="btn btn-link position-absolute h-100 end-0 top-0" id="password-addon">
                    <i class="mdi mdi-eye-outline font-size-18 text-muted"></i>
                </button>
            </div>
        </div>

        <div class="mt-3">
            <button class="btn btn-primary w-100 waves-effect waves-light" type="submit" id="btn-login">
                Log In
            </button>
        </div>
    </form>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const loginForm = document.querySelector('form[action="/admin/login"]');
        const btnLogin = document.getElementById('btn-login');

        if (loginForm) {
            loginForm.addEventListener('submit', function() {
                // Change button text to spinner and disable it
                btnLogin.disabled = true;
                btnLogin.innerHTML = '<i class="bx bx-loader bx-spin font-size-16 align-middle me-2"></i> Sedang memproses...';
            });
        }
    });
</script>
