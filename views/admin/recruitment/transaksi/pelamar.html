<div class="row">
    <div class="col-12">
        <div class="card">
            <div
                class="card-header d-flex justify-content-between align-items-center"
            >
                <h4 class="card-title mb-0">Transaksi Pelamar</h4>
                <div class="d-flex align-items-center gap-2">
                    <label class="mb-0 text-nowrap">Filter Tanggal:</label>
                    <div
                        class="input-group input-group-sm"
                        style="width: 320px"
                    >
                        <input
                            type="date"
                            id="startDate"
                            class="form-control"
                        />
                        <span class="input-group-text">s/d</span>
                        <input type="date" id="endDate" class="form-control" />
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div id="table-recruitment-pelamar"></div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Detail Pelamar -->
<div
    class="modal fade"
    id="modalDetailPelamar"
    tabindex="-1"
    aria-labelledby="modalDetailPelamarLabel"
    aria-hidden="true"
>
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalDetailPelamarLabel">
                    Detail Pelamar
                </h5>
                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"
                    aria-label="Close"
                ></button>
            </div>
            <div class="modal-body">
                <!-- Nav tabs -->
                <ul
                    class="nav nav-tabs nav-tabs-custom nav-justified"
                    role="tablist"
                >
                    <li class="nav-item">
                        <a
                            class="nav-link active"
                            data-bs-toggle="tab"
                            href="#tab-biodata"
                            role="tab"
                        >
                            <span class="d-block d-sm-none"
                                ><i class="fas fa-home"></i
                            ></span>
                            <span class="d-none d-sm-block"
                                >Biodata Pelamar</span
                            >
                        </a>
                    </li>
                    <li class="nav-item">
                        <a
                            class="nav-link"
                            data-bs-toggle="tab"
                            href="#tab-hasil-tes"
                            role="tab"
                        >
                            <span class="d-block d-sm-none"
                                ><i class="far fa-user"></i
                            ></span>
                            <span class="d-none d-sm-block">Hasil Tes</span>
                        </a>
                    </li>
                </ul>

                <!-- Tab panes -->
                <div class="tab-content p-3 text-muted">
                    <div
                        class="tab-pane active"
                        id="tab-biodata"
                        role="tabpanel"
                    >
                        <div id="detail-biodata-content">
                            <!-- Populated via JS -->
                            <div class="text-center py-4">
                                <div
                                    class="spinner-border text-primary"
                                    role="status"
                                >
                                    <span class="visually-hidden"
                                        >Loading...</span
                                    >
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="tab-pane" id="tab-hasil-tes" role="tabpanel">
                        <div id="detail-tes-content">
                            <!-- Populated via JS -->
                            <div class="text-center py-4">
                                <div
                                    class="spinner-border text-primary"
                                    role="status"
                                >
                                    <span class="visually-hidden"
                                        >Loading...</span
                                    >
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button
                    type="button"
                    class="btn btn-secondary"
                    data-bs-dismiss="modal"
                >
                    Tutup
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Grid.js Styles -->
<link rel="stylesheet" href="/static/libs/gridjs/theme/mermaid.min.css" />

<!-- Grid.js JS -->
<script src="/static/libs/gridjs/gridjs.umd.js"></script>

<!-- Custom JS -->
<script src="/static/js/recruitment_pelamar.js"></script>
