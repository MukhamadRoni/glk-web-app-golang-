<div class="row">
    <div class="col-12">
        <div class="card">
            <div
                class="card-header d-flex justify-content-between align-items-center"
            >
                <h4 class="card-title mb-0">Daftar Mata Pelajaran</h4>
            </div>
            <div class="card-body">
                <div class="mb-4 p-3 border rounded bg-light bg-opacity-10">
                    <h5 class="font-size-14 mb-3">
                        <i class="bx bx-plus-circle me-1"></i> Tambah Mata
                        Pelajaran Baru
                    </h5>
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label small fw-bold"
                                >Jenis Pendidikan</label
                            >
                            <select
                                id="mapelJenisPendidikan"
                                class="form-select"
                                required
                            >
                                <option value="">
                                    -- Pilih Jenis Pendidikan --
                                </option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small fw-bold">Kode</label>
                            <input
                                type="text"
                                id="mapelCode"
                                class="form-control"
                                placeholder="Contoh: BIND"
                                required
                            />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold"
                                >Nama Mata Pelajaran</label
                            >
                            <input
                                type="text"
                                id="mapelName"
                                class="form-control"
                                placeholder="Contoh: Bahasa Indonesia"
                                required
                            />
                        </div>
                        <div class="col-md-10">
                            <label class="form-label small fw-bold"
                                >Requirements / Persyaratan (Opsional)</label
                            >
                            <input
                                type="text"
                                id="mapelRequirements"
                                class="form-control"
                                placeholder="Contoh: S1 Pendidikan Bahasa Indonesia, Berpengalaman mengajar min. 1 tahun"
                            />
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button
                                class="btn btn-primary waves-effect btn-label waves-light w-100"
                                type="button"
                                id="btnCreateMapel"
                            >
                                <i class="bx bx-plus label-icon"></i> Tambah
                            </button>
                        </div>
                    </div>
                </div>
                <div class="table-responsive">
                    <table
                        class="table table-bordered table-striped align-middle"
                        id="tableMapel"
                    >
                        <thead class="table-light">
                            <tr>
                                <th width="50">#</th>
                                <th width="150">Jenis Pendidikan</th>
                                <th width="120">Kode</th>
                                <th>Mata Pelajaran</th>
                                <th>Requirements</th>
                                <th width="130">Status</th>
                                <th width="100">Aksi</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/static/js/mapel.js"></script>
