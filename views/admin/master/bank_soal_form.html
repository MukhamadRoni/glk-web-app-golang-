<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h4 class="card-title mb-0" id="formTitle">Form Bank Soal</h4>
                <a href="/admin/recruitment/master/bank-soal" class="btn btn-secondary waves-effect btn-label waves-light">
                    <i class="bx bx-arrow-back label-icon"></i> Kembali
                </a>
            </div>
            <div class="card-body">
                <form id="formBankSoal">
                    <div class="row mb-4">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Judul Bank Soal <span class="text-danger">*</span></label>
                            <input type="text" id="bankTitle" class="form-control" placeholder="Contoh: Soal Ujian Tengah Semester" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Jenis Pendidikan <span class="text-danger">*</span></label>
                            <select id="bankJP" class="form-select" required>
                                <option value="">-- Pilih --</option>
                            </select>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Mata Pelajaran <span class="text-danger">*</span></label>
                            <select id="bankMapel" class="form-select" required>
                                <option value="">-- Pilih --</option>
                            </select>
                        </div>
                        <div class="col-md-2 mb-3">
                            <label class="form-label">Status Aktif</label>
                            <div class="form-check form-switch form-switch-lg" dir="ltr">
                                <input type="checkbox" class="form-check-input" id="bankActive" checked>
                            </div>
                        </div>
                    </div>

                    <hr>
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0">Daftar Pertanyaan</h5>
                        <button type="button" class="btn btn-success waves-effect waves-light" id="btnAddQuestion">
                            <i class="bx bx-plus"></i> Tambah Pertanyaan
                        </button>
                    </div>

                    <div id="questionsContainer">
                        <!-- Questions will be injected here -->
                    </div>

                    <hr class="mt-4">
                    <div class="d-flex gap-2 justify-content-end">
                        <button type="button" id="btnSaveNewVersion" class="btn btn-info waves-effect waves-light d-none">
                            <i class="bx bx-copy"></i> Simpan Sebagai Versi Baru
                        </button>
                        <button type="submit" class="btn btn-primary waves-effect waves-light" id="btnSave">
                            <i class="bx bx-save"></i> Simpan Bank Soal
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<template id="questionTemplate">
    <div class="card border border-primary mb-4 question-card">
        <div class="card-header bg-soft-primary d-flex justify-content-between align-items-center p-2">
            <h6 class="mb-0 ms-2 fw-bold text-primary question-number">Pertanyaan #1</h6>
            <button type="button" class="btn btn-sm btn-danger btn-remove-question">
                <i class="bx bx-trash"></i> Hapus Pertanyaan
            </button>
        </div>
        <div class="card-body p-3">
            <div class="row">
                <div class="col-md-9 mb-3">
                    <label class="form-label">Teks Pertanyaan <span class="text-danger">*</span></label>
                    <textarea class="form-control question-text" rows="2" required></textarea>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Tipe Pertanyaan <span class="text-danger">*</span></label>
                    <select class="form-select question-type">
                        <option value="MULTIPLE_CHOICE">Pilihan Ganda</option>
                        <option value="ESSAY">Essay / Jawaban Terbuka</option>
                    </select>
                </div>
            </div>
            
            <div class="options-section">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <label class="form-label mb-0">Pilihan Jawaban</label>
                    <button type="button" class="btn btn-sm btn-outline-primary btn-add-option">
                        <i class="bx bx-plus"></i> Tambah Pilihan
                    </button>
                </div>
                <div class="options-container">
                    <!-- Options injected here -->
                </div>
            </div>
        </div>
    </div>
</template>

<template id="optionTemplatePG">
    <div class="d-flex align-items-center mb-2 option-row">
        <div class="form-check me-2" title="Tandai sebagai jawaban benar">
            <input class="form-check-input option-correct" type="radio" required>
        </div>
        <input type="text" class="form-control option-text me-2" placeholder="Teks pilihan jawaban..." required>
        <button type="button" class="btn btn-sm btn-outline-danger btn-remove-option" title="Hapus Pilihan">
            <i class="bx bx-x"></i>
        </button>
    </div>
</template>

<template id="optionTemplateEssay">
    <div class="mb-2 option-row">
        <label class="form-label text-muted small mb-1">Panduan Jawaban Admin (Opsional)</label>
        <textarea class="form-control option-text" rows="2" placeholder="Tuliskan kunci jawaban atau poin penting untuk essay ini..."></textarea>
    </div>
</template>

<script src="/static/js/bank_soal_form.js"></script>
